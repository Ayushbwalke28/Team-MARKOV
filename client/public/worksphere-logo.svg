<svg xmlns="http://www.svgrepo.com/show/347432/globe-grid.svg" viewBox="0 0 512 512" width="100%" height="100%" fill="none" stroke-width="20" stroke="currentColor">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a66c2"/>
      <stop offset="100%" stop-color="#001b3d"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
  </defs>

  <!-- Outer Ring (Globe/Sphere) -->
  <circle cx="256" cy="256" r="230" stroke="url(#blueGradient)" stroke-width="40" fill="none" stroke-linecap="round" stroke-dasharray="1000 200" stroke-dashoffset="150" />
  
  <!-- Inner Globe Grid Lines -->
  <path d="M 256 50 C 150 50 100 150 100 256 C 100 360 150 460 256 460" stroke="#a8c8ff" stroke-width="8" />
  <path d="M 256 50 C 360 50 410 150 410 256 C 410 360 360 460 256 460" stroke="#a8c8ff" stroke-width="8" />
  <ellipse cx="256" cy="256" rx="200" ry="60" stroke="#a8c8ff" stroke-width="8" />
  <ellipse cx="256" cy="256" rx="60" ry="200" stroke="#a8c8ff" stroke-width="8" />

  <!-- People Holding Hands Elements -->
  <!-- Left Person -->
  <circle cx="160" cy="300" r="30" fill="url(#blueGradient)" stroke="none" />
  <path d="M 120 420 Q 160 340 200 420" stroke="url(#blueGradient)" stroke-width="25" stroke-linecap="round" fill="none" />
  
  <!-- Right Person -->
  <circle cx="350" cy="300" r="30" fill="url(#blueGradient)" stroke="none" />
  <path d="M 310 420 Q 350 340 390 420" stroke="url(#blueGradient)" stroke-width="25" stroke-linecap="round" fill="none" />
  
  <!-- Center Person (Reaching up) -->
  <circle cx="256" cy="230" r="35" fill="url(#blueGradient)" stroke="none" />
  <path d="M 180 340 C 220 280 290 280 330 340" stroke="url(#blueGradient)" stroke-width="25" stroke-linecap="round" fill="none"/>
  
  <!-- Upward Arrow (Integrated with the right side) -->
  <path d="M 320 240 L 450 100 L 480 200 Z" fill="url(#orangeGradient)" stroke="none" />
  <path d="M 370 290 L 440 180" stroke="url(#orangeGradient)" stroke-width="40" stroke-linecap="round" />
</svg>
